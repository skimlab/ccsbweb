name: CCSB @ PVAMU
description: The Center for Computational Systems Biology at The Prairie View A&M University
url: "https://ccsb.pvamu.edu"
baseurl: ""

markdown: kramdown
permalink: /:categories/:title/
future: true

# 1. ADD SASS CONFIGURATION
# This is crucial now that you've deleted the LESS plugin.
sass:
  sass_dir: css      # Or 'css' if that's where your partials live
  style: compressed    # Optional: Minifies your CSS for the live site
  load_paths:
    - css
    - css/bootstrap-5.3.8/assets/stylesheets
    - css/font-awesome-sass-6.7.2/assets/stylesheets

kramdown:
  extensions:
   - tables
   - no_intra_emphasis
   - autolink
   - superscript
   - strikethrough

exclude:
  - "*.class"
  - "*.cpp"
  - "*.h"
  - "*.hh"
  - "*.ipynb"
  - "*.jar"
  - "*.java"
  - "*.nb"
  - "*.py"
  - "*.R"
  - "*.rb"
  - "*.Rmd"
  - "*.branches"
  - "*.csv"
  - "*.fasta"
  - "*.kml"
  - "*.log"
  - "*.mcc"
  - "*.newick"
  - "*.nex"
  - "*.tsv"
  - "*.tips"
  - "*.trees"
  - "*.txt"
  - "*.zip"
  - "*.gz"
  - "*.tiff"
  - "*.xml"
  - "vendor/bundle/*"
  - "Gemfile"
  - "Gemfile.lock"
  - "migrate_less_to_sass.sh" # Add this to keep your site clean

# 2. UPDATE PLUGINS LIST
plugins: 
  - jekyll-twitter-plugin
  - jekyll-feed           # Good practice for lab news/updates
  - jekyll-sass-converter # Required for your new .scss files
  - bootstrap             # <-- Add this
  - font-awesome-sass     # <-- Add this
